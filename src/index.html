<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Test Codex Project</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="hero">
        <p class="eyebrow">Tauri Demo</p>
        <h1>Desktop app build, not just a script.</h1>
        <p class="lede">
          This project now ships as a small Tauri desktop demo that can be built
          into a native executable with one command.
        </p>
      </section>

      <section class="panel-grid">
        <article class="panel">
          <h2>Runtime</h2>
          <dl class="facts">
            <div>
              <dt>Platform</dt>
              <dd id="platform">Loading...</dd>
            </div>
            <div>
              <dt>Architecture</dt>
              <dd id="arch">Loading...</dd>
            </div>
            <div>
              <dt>Mode</dt>
              <dd id="mode">Loading...</dd>
            </div>
          </dl>
        </article>

        <article class="panel">
          <h2>Greeting</h2>
          <label class="field" for="name-input">Your name</label>
          <div class="controls">
            <input id="name-input" type="text" value="Codex teammate" />
            <button id="greet-button" type="button">Invoke Rust Command</button>
          </div>
          <p id="greeting-output" class="response">
            Press the button to call the backend.
          </p>
        </article>
      </section>
    </main>

    <script src="./main.js"></script>
  </body>
</html>
